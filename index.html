<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Gallery — Original vs. Reimagined</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #C9A227;
            --gold-light: #E8D48B;
            --gold-dark: #8B6914;
            --obsidian: #0D0D0D;
            --charcoal: #1A1A1A;
            --slate: #2D2D2D;
            --ivory: #F5F2E8;
            --cream: #FAF8F0;
            --accent-red: #8B2635;
            --accent-teal: #2A6B6B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--obsidian);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1000;
        }

        /* Art Deco geometric header */
        header {
            position: relative;
            padding: 80px 40px 60px;
            text-align: center;
            background: linear-gradient(180deg, var(--charcoal) 0%, var(--obsidian) 100%);
            border-bottom: 1px solid var(--gold-dark);
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(201, 162, 39, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Art Deco sunburst pattern */
        .deco-pattern {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 60px;
            opacity: 0.6;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            color: var(--ivory);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            animation: titleReveal 1.2s ease-out;
        }

        @keyframes titleReveal {
            from {
                opacity: 0;
                letter-spacing: 0.5em;
            }

            to {
                opacity: 1;
                letter-spacing: 0.15em;
            }
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .subtitle {
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            font-style: italic;
            color: var(--gold);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-top: 30px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.5s forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Main gallery grid */
        .gallery {
            max-width: 1600px;
            margin: 0 auto;
            padding: 60px 40px 100px;
            display: flex;
            flex-direction: column;
            gap: 80px;
        }

        /* Each comparison card */
        .comparison-card {
            display: grid;
            grid-template-columns: 1fr auto 1fr auto 1fr auto 1fr auto 1fr auto 1fr;
            gap: 0;
            background: var(--charcoal);
            border: 1px solid var(--slate);
            position: relative;
            opacity: 0;
            transform: translateY(40px);
            animation: cardReveal 0.8s ease-out forwards;
        }

        .comparison-card:nth-child(1) {
            animation-delay: 0.2s;
        }

        .comparison-card:nth-child(2) {
            animation-delay: 0.35s;
        }

        .comparison-card:nth-child(3) {
            animation-delay: 0.5s;
        }

        .comparison-card:nth-child(4) {
            animation-delay: 0.65s;
        }

        .comparison-card:nth-child(5) {
            animation-delay: 0.8s;
        }

        .comparison-card:nth-child(6) {
            animation-delay: 0.95s;
        }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Gold corner accents */
        .comparison-card::before,
        .comparison-card::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid var(--gold);
            pointer-events: none;
        }

        .comparison-card::before {
            top: -1px;
            left: -1px;
            border-right: none;
            border-bottom: none;
        }

        .comparison-card::after {
            bottom: -1px;
            right: -1px;
            border-left: none;
            border-top: none;
        }

        /* Card title strip */
        .card-title {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--obsidian);
            padding: 8px 40px;
            border: 1px solid var(--gold);
            z-index: 10;
        }

        .card-title h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            color: var(--gold);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Original side */
        .svg-original {
            padding: 60px 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--slate);
            position: relative;
        }

        .svg-original::before {
            content: 'Opus 4.5';
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }

        /* Divider */
        .divider {
            width: 1px;
            background: linear-gradient(180deg, var(--gold-dark), var(--gold), var(--gold-dark));
            position: relative;
        }

        .divider::before {
            content: 'VS';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--obsidian);
            padding: 15px 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            color: var(--gold);
            letter-spacing: 0.1em;
        }

        /* Reimagined side */
        .svg-reimagined {
            padding: 60px 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--charcoal);
            position: relative;
        }

        .svg-reimagined::before {
            content: 'Opus 4.5 + Frontend Design Skill';
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: var(--gold);
            text-transform: uppercase;
        }

        /* Opus Plus side */
        .svg-opus-plus {
            padding: 60px 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--slate);
            position: relative;
        }

        .svg-opus-plus::before {
            content: 'Gemini 3 Pro (High)';
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: var(--accent-teal);
            text-transform: uppercase;
        }

        /* Gemini Flash side */
        .svg-gemini-flash {
            padding: 60px 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--charcoal);
            position: relative;
        }

        .svg-gemini-flash::before {
            content: 'Gemini 3 Flash';
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: var(--accent-red);
            text-transform: uppercase;
        }

        .svg-gemini-flash .svg-container {
            transition: transform 0.4s ease;
        }

        .comparison-card:hover .svg-gemini-flash .svg-container {
            transform: scale(1.1);
            filter: drop-shadow(0 0 15px rgba(139, 38, 53, 0.3));
        }

        /* Composer 2.5 Fast Max side */
        .svg-composer {
            padding: 60px 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--obsidian);
            position: relative;
        }

        .svg-composer::before {
            content: 'Composer 2.5 Fast Max';
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: #6C5CE7;
            text-transform: uppercase;
        }

        .svg-composer .svg-container {
            transition: transform 0.4s ease;
        }

        .comparison-card:hover .svg-composer .svg-container {
            transform: scale(1.08);
            filter: drop-shadow(0 0 18px rgba(108, 92, 231, 0.45));
        }

        /* Opus 4.7 Max side */
        .svg-opus-max {
            padding: 60px 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--slate);
            position: relative;
        }

        .svg-opus-max::before {
            content: 'Opus 4.7 Max';
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: #D97757;
            text-transform: uppercase;
        }

        .svg-opus-max .svg-container {
            transition: transform 0.4s ease;
        }

        .comparison-card:hover .svg-opus-max .svg-container {
            transform: scale(1.08);
            filter: drop-shadow(0 0 18px rgba(217, 119, 87, 0.5));
        }

        .svg-opus-plus .svg-container {
            transition: transform 0.4s ease;
        }

        .comparison-card:hover .svg-opus-plus .svg-container {
            transform: scale(1.1);
            filter: drop-shadow(0 0 15px rgba(201, 162, 39, 0.3));
        }

        /* SVG containers */
        .svg-container {
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .svg-original .svg-container {
            opacity: 0.7;
            filter: grayscale(30%);
            transition: all 0.4s ease;
        }

        .comparison-card:hover .svg-original .svg-container {
            opacity: 1;
            filter: grayscale(0%);
        }

        .svg-reimagined .svg-container {
            transition: transform 0.4s ease;
        }

        .comparison-card:hover .svg-reimagined .svg-container {
            transform: scale(1.05);
        }

        .svg-container svg {
            width: 100%;
            height: 100%;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 60px 40px;
            background: var(--charcoal);
            border-top: 1px solid var(--slate);
        }

        footer p {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.1em;
        }

        footer span {
            color: var(--gold);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .comparison-card {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto auto auto auto auto auto auto auto;
            }

            .divider {
                width: 100%;
                height: 1px;
            }

            .divider::before {
                padding: 8px 15px;
            }

            .svg-original::before {
                top: 15px;
                left: 50%;
                transform: translateX(-50%);
            }

            .svg-reimagined::before {
                top: 15px;
                right: auto;
                left: 50%;
                transform: translateX(-50%);
            }

            .svg-opus-plus::before {
                top: 15px;
                right: auto;
                left: 50%;
                transform: translateX(-50%);
            }

            .svg-composer::before {
                top: 15px;
                right: auto;
                left: 50%;
                transform: translateX(-50%);
            }

            .svg-opus-max::before {
                top: 15px;
                right: auto;
                left: 50%;
                transform: translateX(-50%);
            }
        }

        @media (max-width: 600px) {
            header {
                padding: 60px 20px 40px;
            }

            .gallery {
                padding: 40px 20px 80px;
                gap: 60px;
            }

            .svg-container {
                width: 160px;
                height: 160px;
            }

            .card-title {
                padding: 6px 25px;
            }

            .card-title h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <header>

        <svg class="deco-pattern" viewBox="0 0 120 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M60 60 L60 0" stroke="#C9A227" stroke-width="1" />
            <path d="M60 60 L30 0" stroke="#C9A227" stroke-width="1" />
            <path d="M60 60 L90 0" stroke="#C9A227" stroke-width="1" />

        <h1>SVG Gallery</h1>

    <main class="gallery">

                <h2>Monstera Plant</h2>

            <div class="svg-original">

                        <path d="M37 32 Q40 28 43 32" stroke="#27ae60" stroke-width="1" fill="none" />
                        <path d="M40 40 Q15 35 10 15 Q25 20 35 10 Q30 25 40 40" fill="#27ae60" />
                        <path d="M22 25 Q25 20 30 24" stroke="#1e8449" stroke-width="1" fill="none" />
                        <path d="M60 35 Q75 25 85 15 Q75 20 70 10 Q72 25 60 35" fill="#2ecc71" />

            <div class="divider"></div>

            <div class="svg-reimagined">
                <div class="svg-container">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="potGrad" x1="0%" y1="0%" x2="0%" y2="100%">

            <div class="divider"></div>

            <div class="svg-opus-plus">
